apiVersion: apps/v1
kind: Deployment
metadata:
  name: simple-time-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: simple-time-service
  template:
    metadata:
      labels:
        app: simple-time-service
    spec:
      containers:
      - name: simple-time-service
        image: gappi2108/simple-time-service:latest
        ports:
        - containerPort: 5000
        resources:
          limits:
            cpu: "500m"
            memory: "256Mi"
          requests:
            cpu: "250m"
            memory: "128Mi"

---
apiVersion: v1
kind: Service
metadata:
  name: simple-time-service
spec:
  type: NodePort
  selector:
    app: simple-time-service
  ports:
    - protocol: TCP
      port: 80
      targetPort: 5000
      nodePort: 30007
